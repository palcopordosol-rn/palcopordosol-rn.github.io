<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerador do Arquivo letras2.js (LRCLIB Search)</title>
    <style>
        body { font-family: 'Poppins', sans-serif; max-width: 650px; margin: 40px auto; padding: 20px; line-height: 1.6; background: #f9f9f9; color: #333; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-top: 5px solid #006b3f; }
        h2 { color: #006b3f; margin-top: 0; }
        button { background: #006b3f; color: white; border: none; padding: 15px 30px; font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; width: 100%; transition: 0.2s; }
        button:hover { background: #02492b; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #log { margin-top: 20px; background: #1e1e1e; color: #a6e22e; padding: 20px; border-radius: 10px; max-height: 350px; overflow-y: auto; font-family: 'Courier New', Courier, monospace; font-size: 13px; }
        .sucesso { color: #66d9ef; font-weight: bold; }
        .erro { color: #f92672; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Gerador Automático: letras2.js</h2>
        <p>Este script utiliza a busca inteligente do LRCLIB para mapear as 46 músicas do <strong>Especial Só Penso Samba</strong> e estruturar o arquivo de dados estáticos.</p>
        
        <button id="btnIniciar">Iniciar Busca com LRCLIB e Gerar letras2.js</button>

        <div id="log">Aguardando comando para iniciar varredura...</div>
    </div>

    <script>
        // Lista oficial extraída diretamente do seu arquivo especial-so-penso-samba-v4.html
        const SONGS = [
            { id:1,  titulo:"Eu Vou para a Roda de Samba",   interprete:"Jones do Samba" },
            { id:2,  titulo:"Não Deixe o Samba Morrer",      interprete:"Alcione" },
            { id:3,  titulo:"Retalhos de Cetim",             interprete:"Benito Di Paula" },
            { id:4,  titulo:"Coisinha do Pai",               interprete:"Beth Carvalho" },
            { id:5,  titulo:"Vou Festejar",                  interprete:"Beth Carvalho" },
            { id:6,  titulo:"Trem das Onze",                 interprete:"Adoniran Barbosa" },
            { id:7,  titulo:"O Mundo É um Moinho",           interprete:"Cartola" },
            { id:8,  titulo:"Canto das Três Raças",          interprete:"Clara Nunes" },
            { id:9,  titulo:"Samba pras Moças",              interprete:"Zeca Pagodinho" },
            { id:10, titulo:"Mal Acostumada",                interprete:"Ara Ketu" },
            { id:11, titulo:"Só pra Te Encontrar",           interprete:"Jones do Samba" },
            { id:12, titulo:"Amor Perfeito (Ao Vivo)",       interprete:"Babado Novo" },
            { id:13, titulo:"O Amor da Tua Voz",             interprete:"Jones do Samba" },
            { id:14, titulo:"Preciso Me Encontrar",          interprete:"Cartola" },
            { id:15, titulo:"Marinheiro Só (1982)",          interprete:"Clementina de Jesus" },
            { id:16, titulo:"De Mais Ninguém",               interprete:"Marisa Monte" },
            { id:17, titulo:"Rosa",                          interprete:"Marisa Monte" },
            { id:18, titulo:"Trilha do Amor (Ao Vivo)",      interprete:"Arlindo Cruz" },
            { id:19, titulo:"Samba de Arerê (Ao Vivo)",      interprete:"Beth Carvalho" },
            { id:20, titulo:"Poder da Criação",              interprete:"João Nogueira" },
            { id:21, titulo:"Papel de Pão",                  interprete:"Jorge Aragão" },
            { id:22, titulo:"Coisa de Pele",                 interprete:"Jorge Aragão" },
            { id:23, titulo:"João e Maria (Ao Vivo)",        interprete:"Chico Buarque" },
            { id:24, titulo:"No Inverno Eu Quero Amor",      interprete:"Jones do Samba" },
            { id:25, titulo:"Pecado Capital",                interprete:"Paulinho da Viola" },
            { id:26, titulo:"Volta por Cima (1962)",         interprete:"Beth Carvalho" },
            { id:27, titulo:"Do Jeito Que a Vida Quer",      interprete:"Benito Di Paula" },
            { id:28, titulo:"Deixei na Bahia",               interprete:"Déborah Cecília" },
            { id:29, titulo:"Juízo Final",                   interprete:"Clara Nunes" },
            { id:30, titulo:"Disritmia",                     interprete:"Martinho da Vila" },
            { id:31, titulo:"Deixa Eu Te Amar",              interprete:"Agepê" },
            { id:32, titulo:"O Que É, O Que É?",             interprete:"Gonzaguinha" },
            { id:33, titulo:"Flor de Lis (Ao Vivo)",         interprete:"Djavan" },
            { id:34, titulo:"Tanta Saudade",                 interprete:"Djavan" },
            { id:35, titulo:"Fato Consumado",                interprete:"Djavan" },
            { id:36, titulo:"Essa Tal Liberdade",            interprete:"Só Pra Contrariar" },
            { id:37, titulo:"Mineirinho (Ao Vivo)",          interprete:"Só Pra Contrariar" },
            { id:38, titulo:"Burguesinha",                   interprete:"Seu Jorge" },
            { id:39, titulo:"Que Se Chama Amor (Ao Vivo)",   interprete:"Só Pra Contrariar" },
            { id:40, titulo:"Amigo do Sol, Amigo da Lua",    interprete:"Benito Di Paula" },
            { id:41, titulo:"Gostava Tanto de Você",         interprete:"Tim Maia" },
            { id:42, titulo:"Paisagem da Janela",            interprete:"Lô Borges" },
            { id:43, titulo:"Frisson",                       interprete:"Tunai" },
            { id:44, titulo:"Mas Que Nada",                  interprete:"Jorge Ben Jor" },
            { id:45, titulo:"Como Nossos Pais",              interprete:"Elis Regina" },
            { id:46, titulo:"O Bêbado e a Equilibrista",     interprete:"Elis Regina" }
        ];

        document.getElementById('btnIniciar').addEventListener('click', async () => {
            const btn = document.getElementById('btnIniciar');
            const logDiv = document.getElementById('log');
            
            btn.disabled = true;
            logDiv.innerHTML = "Conectando ao LRCLIB...<br><br>";
            
            let blocosDeTextoLetras = [];

            for (let i = 0; i < SONGS.length; i++) {
                const song = SONGS[i];
                logDiv.innerHTML += `Buscando [${song.id}/46] — ${song.titulo}... `;
                logDiv.scrollTop = logDiv.scrollHeight; // Auto-scroll
                
                // Mapeamento Inteligente: Remove marcações de "Ao Vivo" ou datas para melhorar a precisão da busca
                const tituloLimpo = song.titulo.replace(/\(Ao Vivo\)/gi, '').replace(/\(\d{4}\)/gi, '').trim();
                const termoBusca = `${song.interprete} ${tituloLimpo}`;
                const url = `https://lrclib.net/api/search?q=${encodeURIComponent(termoBusca)}`;
                
                let letraTexto = "";
                
                try {
                    const response = await fetch(url);
                    if (response.ok) {
                        const resultados = await response.json();
                        if (resultados && resultados.length > 0 && resultados[0].plainLyrics) {
                            letraTexto = resultados[0].plainLyrics;
                            logDiv.innerHTML += `<span class="sucesso">ENCONTRADA!</span><br>`;
                        } else {
                            logDiv.innerHTML += `<span class="erro">SEM LETRA DISPONÍVEL</span><br>`;
                        }
                    } else {
                        logDiv.innerHTML += `<span class="erro">ERRO ${response.status}</span><br>`;
                    }
                } catch (err) {
                    logDiv.innerHTML += `<span class="erro">FALHA DE CONEXÃO</span><br>`;
                }

                // Codifica as quebras de linha reais para o literal "\n" para preservar o formato exigido
                const letraFormatadaJS = letraTexto ? JSON.stringify(letraTexto) : '""';
                
                // Monta a linha individual no formato id: { letra: "..." }
                blocosDeTextoLetras.push(`  ${song.id}: { letra: ${letraFormatadaJS} }, // ${song.titulo} — ${song.interprete}`);

                // Delay estratégico para respeitar o limite de requisições por segundo
                await new Promise(r => setTimeout(r, 250));
            }

            logDiv.innerHTML += "<br><span class='sucesso'>Buscas finalizadas! Estruturando formato letras2.js...</span><br>";
            logDiv.scrollTop = logDiv.scrollHeight;

            // Monta o cabeçalho e corpo estruturado de letras2.js
            const conteudoArquivo = 
`// letras2.js — fonte de letras do Especial Só Penso Samba
// Arquivo gerado automaticamente via LRCLIB Fuzzy Search

const letras = {
${blocosDeTextoLetras.join('\n')}
};`;

            // Força o download do arquivo gerado
            const blob = new Blob([conteudoArquivo], { type: 'text/javascript;charset=utf-8' });
            const urlDownload = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = urlDownload;
            a.download = 'letras2.js';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            logDiv.innerHTML += "<br><span class='sucesso'>✓ O download do seu arquivo 'letras2.js' foi iniciado! Substitua o arquivo antigo na pasta do seu app.</span>";
            logDiv.scrollTop = logDiv.scrollHeight;
            btn.disabled = false;
        });
    </script>
</body>
</html>
