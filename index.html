<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Letras - Vagalume API (JSONP)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f7f9fc;
            color: #333;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        #resultado {
            margin-top: 25px;
            padding: 20px;
            background: white;
            border-radius: 6px;
            white-space: pre-line;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            line-height: 1.6;
        }
        .erro {
            color: #dc3545;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Buscar Letra no Vagalume</h2>
    
    <div class="form-group">
        <label for="artista">Artista / Banda:</label>
        <input type="text" id="artista" placeholder="Ex: Coldplay">
    </div>

    <div class="form-group">
        <label for="musica">Nome da Música:</label>
        <input type="text" id="musica" placeholder="Ex: Yellow">
    </div>

    <button id="btnBuscar">Buscar Letra</button>

    <div id="resultado" style="display: none;"></div>

    <script>
        // 1. Função genérica para realizar requisições via JSONP simulando o comportamento de uma Promise
        function fetchJSONP(url, callbackName = 'vagalumeCallback') {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                
                // Define o escopo global que a API vai executar ao responder
                window[callbackName] = function(data) {
                    resolve(data);
                    cleanup();
                };

                // Trata falhas de rede ou se a rota não existir
                script.onerror = function() {
                    reject(new Error(`Falha ao carregar o script JSONP.`));
                    cleanup();
                };

                // Concatena o parâmetro de callback na URL existente
                const urlWithCallback = url.includes('?') 
                    ? `${url}&callback=${callbackName}` 
                    : `${url}?callback=${callbackName}`;

                script.src = urlWithCallback;
                document.body.appendChild(script);

                // Remove os rastros do script injetado dinamicamente
                function cleanup() {
                    if (script.parentNode) {
                        script.parentNode.removeChild(script);
                    }
                    delete window[callbackName];
                }
            });
        }

        // 2. Função principal que monta os parâmetros e consome a API do Vagalume
        async function buscarLetraVagalume(artista, musica) {
            const apiKey = ''; // Opcional: Insira sua API key do Vagalume aqui se tiver
            const url = `https://api.vagalume.com.br/search.php?art=${encodeURIComponent(artista)}&mus=${encodeURIComponent(musica)}&apikey=${apiKey}`;
            const resultadoDiv = document.getElementById('resultado');

            try {
                // Atualiza a tela sinalizando o carregamento
                resultadoDiv.style.display = 'block';
                resultadoDiv.innerHTML = '<em>Buscando letra...</em>';

                // Executa a chamada contornando o erro de CORS
                const data = await fetchJSONP(url, 'callbackVagalume');
                
                // Valida a resposta do servidor
                if (data.type === 'exact' || data.type === 'aprox') {
                    const letra = data.mus[0].text;
                    const nomeMusica = data.mus[0].name;
                    const nomeArtista = data.art.name;
                    
                    // Renderiza o resultado formatado na página
                    resultadoDiv.innerHTML = `<h3>${nomeMusica}</h3><strong>${nomeArtista}</strong><hr><p>${letra}</p>`;
                } else {
                    resultadoDiv.innerHTML = '<p class="erro">Música não encontrada no acervo do Vagalume.</p>';
                }
            } catch (error) {
                console.error(error);
                resultadoDiv.innerHTML = '<p class="erro">Houve um erro na comunicação com o servidor. Tente novamente.</p>';
            }
        }

        // 3. Captura o clique do botão para iniciar a busca
        document.getElementById('btnBuscar').addEventListener('click', () => {
            const artista = document.getElementById('artista').value.trim();
            const musica = document.getElementById('musica').value.trim();

            if (artista && musica) {
                buscarLetraVagalume(artista, musica);
            } else {
                alert('Por favor, preencha os campos de Artista e Música.');
            }
        });
    </script>
</body>
</html>
