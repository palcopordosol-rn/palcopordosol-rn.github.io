<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Especial Só Penso Samba</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="letras2 (1).js"></script>
  <style>
    :root {
      --verde:       #006b3f;
      --verde-claro: #3ca36c;
      --verde-bg:    #f0faf4;
      --dourado:     #d8a338;
      --texto:       #1d1d1d;
      --letra-tam:   20px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #e0e0e0;
      font-family: 'Poppins', sans-serif;
      color: var(--texto);
      -webkit-font-smoothing: antialiased;
    }
    #app {
      width: 100%;
      max-width: 768px;
      margin: 0 auto;
      min-height: 100vh;
      background: white;
      box-shadow: 0 0 40px rgba(0,0,0,0.15);
      position: relative;
    }

    /* ══ CAPA ══ */
    #capa {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.91), rgba(255,255,255,0.95)),
        url('https://images.unsplash.com/photo-1511192336575-5a79af67a629?q=80&w=1200&auto=format&fit=crop')
        center/cover no-repeat;
      padding: 28px 22px 0;
      min-height: 100dvh;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .toplogos {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 13px;
      color: var(--verde);
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }
    .toplogos .sep { opacity:.4; }
    .toplogo-link {
      color: var(--verde);
      text-decoration: none;
      font-weight: 700;
      border-bottom: 1.5px solid var(--verde-claro);
      padding-bottom: 1px;
      transition: opacity .2s;
    }
    .toplogo-link:hover { opacity: .7; }
    .title { text-align: center; margin-top: 10px; }
    .title small {
      display: block;
      color: var(--verde-claro);
      font-weight: 700;
      letter-spacing: 4px;
      font-size: 11px;
      margin-bottom: 8px;
    }
    .title h2 { font-family:'Playfair Display',serif; font-size:26px; color:var(--verde); }
    .title h1 { font-family:'Playfair Display',serif; font-size:54px; line-height:.95; color:var(--verde); }
    .artists { margin-top:26px; display:flex; flex-direction:column; gap:10px; align-items:center; }
    .artist-pill {
      background: linear-gradient(90deg, var(--verde), #02492b);
      color: white;
      padding: 12px 28px;
      border-radius: 999px;
      font-size: 20px;
      font-weight: 700;
      width: 84%;
      text-align: center;
      box-shadow: 0 5px 14px rgba(0,0,0,0.14);
    }
    .event-box {
      margin-top: 28px;
      background: var(--verde);
      color: white;
      border-radius: 24px 24px 0 0;
      padding: 22px 20px 0;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .event-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:18px; }
    .event-card {
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 16px;
      padding: 14px;
      text-align: center;
      font-size: 13px;
    }
    .event-card strong { display:block; font-size:26px; margin-top:3px; }
    .address {
      background: white;
      color: var(--verde);
      border-radius: 16px;
      padding: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
      font-size: 14px;
      line-height: 1.6;
    }
    .slogan {
      font-family:'Playfair Display',serif;
      text-align: center;
      font-size: 38px;
      line-height: 1;
      color: var(--dourado);
      padding: 24px 0 28px;
    }
    .capa-btn-wrap { margin-top:auto; padding:24px 20px 32px; background:var(--verde); }
    .capa-btn {
      display: block;
      width: 100%;
      background: var(--dourado);
      color: white;
      border: none;
      border-radius: 16px;
      padding: 18px 28px;
      font-family: 'Poppins', sans-serif;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .5px;
      box-shadow: 0 4px 14px rgba(0,0,0,.28);
    }
    .capa-btn:hover { filter:brightness(1.08); }

    /* ══ ÍNDICE ══ */
    #view-index { display:none; padding:26px 20px 40px; }
    #view-index.active { display:block; }
    .idx-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
    .idx-header h2 { font-family:'Playfair Display',serif; font-size:30px; color:var(--verde); }
    .back-capa {
      background: none;
      border: 2px solid var(--verde);
      color: var(--verde);
      border-radius: 10px;
      padding: 6px 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    /* ── Busca ── */
    .search-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    .search-wrap input {
      width: 100%;
      padding: 12px 16px 12px 42px;
      border: 2px solid #d4eadc;
      border-radius: 14px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      color: var(--texto);
      background: #f8fdf9;
      outline: none;
      transition: border-color .2s;
    }
    .search-wrap input:focus { border-color: var(--verde); }
    .search-wrap input::placeholder { color: #aaa; }
    .search-wrap .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      pointer-events: none;
    }
    .search-wrap .search-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: #ccc;
      border: none;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-size: 13px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      line-height: 1;
    }
    .search-wrap .search-clear.visible { display:flex; }
    .search-results-info {
      font-size: 12px;
      color: #888;
      margin-bottom: 10px;
      padding-left: 4px;
    }
    .tip-box {
      background: var(--verde-bg);
      border: 2px solid var(--dourado);
      color: var(--verde);
      padding: 14px 16px;
      border-radius: 16px;
      margin-bottom: 20px;
      font-weight: 600;
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: white;
      background: var(--verde);
      border-radius: 7px;
      padding: 3px 11px;
      margin: 18px 0 9px;
      display: inline-block;
    }
    .music-list { display:flex; flex-direction:column; gap:7px; }
    .music-list button {
      width: 100%;
      background: #f6f6f6;
      border: none;
      border-left: 5px solid var(--verde);
      border-radius: 13px;
      padding: 11px 12px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      transition: .18s;
    }
    .music-list button:hover { background:#e8f5ee; transform:translateX(3px); }
    .music-list button .num {
      background: var(--verde);
      color: white;
      border-radius: 7px;
      min-width: 27px;
      height: 27px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .music-list button .info { display:flex; flex-direction:column; gap:1px; flex:1; }
    .music-list button .info > span:first-child { font-size:14px; font-weight:700; color: var(--verde); }
    .music-list button .info .artista { font-size:11px; font-weight:400; color:#888; }
    .music-list button .cantor-tag {
      margin-left: auto;
      font-size: 9px;
      font-weight: 700;
      color: var(--dourado);
      background: #fff8e6;
      border-radius: 6px;
      padding: 2px 7px;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .no-results {
      text-align: center;
      padding: 30px 20px;
      color: #aaa;
      font-size: 14px;
    }

    /* ══ MÚSICA ══ */
    #view-song {
      display: none;
      flex-direction: column;
      height: 100dvh;
      height: 100vh;
      overflow: hidden;
    }
    #view-song.active { display:flex; }

    .song-header {
      background: linear-gradient(135deg, var(--verde), #02492b);
      padding: 12px 18px 12px;
      color: white;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .song-header::after {
      content:'';
      position:absolute;
      width:130px; height:130px;
      border-radius:50%;
      background:rgba(255,255,255,.07);
      right:-35px; top:-35px;
    }
    .song-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }
    .song-nav button {
      background: rgba(255,255,255,.15);
      border: none;
      color: white;
      border-radius: 10px;
      padding: 6px 13px;
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .song-nav button:hover { background:rgba(255,255,255,.25); }
    .song-nav .track-num { font-size:11px; font-weight:700; letter-spacing:2px; opacity:.65; }
    .song-header h2 { font-size:22px; line-height:1.15; margin-bottom:8px; position:relative; z-index:1; font-family:'Playfair Display',serif; letter-spacing:.3px; text-shadow: 0 1px 4px rgba(0,0,0,.18); }
    .song-meta { display:flex; flex-wrap:wrap; gap:7px; align-items:center; position:relative; z-index:1; }
    .song-meta span { font-size:12px; opacity:.9; }
    .tom-badge { background:var(--dourado); color:#1d1d1d; border-radius:7px; padding:2px 9px; font-size:11px; font-weight:700; }
    .cantor-badge { background:rgba(255,255,255,.18); border-radius:7px; padding:2px 9px; font-size:11px; font-weight:600; }

    /* ── Controle de fonte ── */
    .font-ctrl {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 7px 18px;
      background: #f0faf4;
      border-bottom: 1px solid #d4eadc;
      flex-shrink: 0;
    }
    .font-ctrl-label {
      font-size: 11px;
      color: #888;
      font-weight: 500;
      flex: 1;
      text-align: center;
    }
    .font-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 14px;
      height: 36px;
      border-radius: 10px;
      border: 2px solid var(--verde);
      background: white;
      color: var(--verde);
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: .15s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .font-btn:hover, .font-btn:active { background:var(--verde); color:white; }
    .font-btn .fb-icon { font-size:16px; font-weight:900; line-height:1; }
    .font-btn .fb-label { font-size:10px; font-weight:400; opacity:.8; }

    /* Área da letra */
    .lyrics-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 20px 18px;
      -webkit-overflow-scrolling: touch;
      min-height: 0;
    }
    .lyrics-text {
      font-size: var(--letra-tam);
      line-height: 1.9;
      color: #222;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .state-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      min-height: 160px;
      text-align: center;
      padding: 30px;
    }
    .state-error .err-icon { font-size:36px; }
    .state-error p { color:#555; font-size:13px; line-height:1.6; }

    /* Botões inferiores */
    .song-links {
      display: flex;
      gap: 8px;
      padding: 8px 18px;
      flex-shrink: 0;
      border-top: 1px solid #eee;
    }
    .song-links a {
      flex: 1;
      text-decoration: none;
      color: white;
      padding: 11px 6px;
      border-radius: 12px;
      text-align: center;
      font-weight: 700;
      font-size: 12px;
    }
    .song-links a.yt { background:#c8000a; }

    .song-nav-bottom {
      display: flex;
      gap: 8px;
      padding: 6px 18px 10px;
      flex-shrink: 0;
    }
    .song-nav-bottom button {
      flex: 1;
      background: #f3f3f3;
      border: none;
      border-radius: 12px;
      padding: 11px;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--verde);
      cursor: pointer;
    }
    .song-nav-bottom button:hover { background:#e4f2eb; }
    .song-nav-bottom button:disabled { opacity:.35; cursor:default; }

    /* ── Responsividade ── */
    @media (min-width: 500px) {
      .title h1    { font-size:72px; }
      .title h2    { font-size:34px; }
      .artist-pill { font-size:24px; padding:14px 32px; }
      .capa-btn    { font-size:20px; }
      .slogan      { font-size:48px; }
      .event-card strong { font-size:34px; }
      .music-list button { font-size:15px; }
      .song-header h2 { font-size:26px; }
    }
    @media (min-width: 640px) {
      .title h1    { font-size:86px; }
      .artist-pill { font-size:28px; }
      .slogan      { font-size:56px; }
      .song-header h2 { font-size:30px; }
    }
    /* Celular deitado */
    @media (max-height: 500px) {
      .song-header  { padding:8px 18px; }
      .song-header h2 { font-size:16px; margin-bottom:4px; }
      .song-nav     { margin-bottom:4px; }
      .font-ctrl    { padding:4px 18px; }
      .font-btn     { height:30px; font-size:12px; }
      .song-links a { padding:7px 6px; font-size:11px; }
      .song-nav-bottom button { padding:7px; font-size:12px; }
      .song-nav-bottom { padding:4px 18px 6px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ══ CAPA ══ -->
  <div id="capa">
    <div class="toplogos">
      <a href="https://instagram.com/natal_bier" target="_blank" class="toplogo-link">Natal Bier</a><span class="sep">&amp;</span><a href="https://instagram.com/palcopordosol" target="_blank" class="toplogo-link">Palco Pôr do Sol</a>
    </div>
    <div class="title">
      <small>APRESENTAM</small>
      <h2>Especial</h2>
      <h1>Só Penso<br>Samba</h1>
    </div>
    <div class="artists">
      <div class="artist-pill">Jones do Samba</div>
      <div class="artist-pill">Val</div>
      <div class="artist-pill">Convidados</div>
    </div>
    <div class="event-box">
      <div class="event-grid">
        <div class="event-card">Maio<strong>23</strong>Sábado</div>
        <div class="event-card">Abertura<strong>19H</strong>da Casa</div>
      </div>
      <div class="address">Rua Leonora Armstrong, 35<br>Ponta Negra — Natal/RN</div>
      <div class="slogan">Samba,<br>Amigos e Alegria!</div>
    </div>
    <div class="capa-btn-wrap">
      <button class="capa-btn" onclick="showIndex()">🎶 Ver Repertório</button>
    </div>
  </div>

  <!-- ══ ÍNDICE ══ -->
  <div id="view-index">
    <div class="idx-header">
      <button class="back-capa" onclick="showCapa()">← Início</button>
      <h2>Repertório</h2>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" id="search-input"
             placeholder="Buscar música ou artista..."
             oninput="filterSongs(this.value)"
             autocomplete="off" autocorrect="off" spellcheck="false"/>
      <button class="search-clear" id="search-clear" onclick="clearSearch()" title="Limpar">✕</button>
    </div>
    <div class="search-results-info" id="search-info"></div>

    <div class="tip-box">🎶 Toque na música para ver a letra e cantar junto!</div>
    <div id="list-container"></div>
  </div>

  <!-- ══ MÚSICA ══ -->
  <div id="view-song">
    <div class="song-header">
      <div class="song-nav">
        <button onclick="showIndex()">← Repertório</button>
        <span class="track-num" id="track-num"></span>
        <button style="opacity:0;pointer-events:none">.</button>
      </div>
      <h2 id="song-title"></h2>
      <div class="song-meta" id="song-meta"></div>
    </div>

    <div class="font-ctrl">
      <button class="font-btn" id="btn-menor" onclick="changeFont(-2)">
        <span class="fb-icon">A−</span>
        <span class="fb-label">menor</span>
      </button>
      <span class="font-ctrl-label">Tamanho da letra</span>
      <button class="font-btn" id="btn-maior" onclick="changeFont(+2)">
        <span class="fb-icon">A+</span>
        <span class="fb-label">maior</span>
      </button>
    </div>

    <div class="lyrics-area" id="lyrics-area"></div>

    <div class="song-links" id="song-links"></div>

    <div class="song-nav-bottom">
      <button id="btn-prev" onclick="navSong(-1)">◀ Anterior</button>
      <button id="btn-next" onclick="navSong(+1)">Próxima ▶</button>
    </div>
  </div>

</div>

  { label:"19h30: Esquenta",            ids: [40,41,42,43,44, 33,34,35,36,37,38,39] },
  { label:"20h30: Só Penso Samba", ids: [2,13,27,20,22,8,24,25,29,14,15,48,49,50,51,10,11,30,17,16,3,9,1,19,4,5,26,45,46,6,32] },
];
/* ── Mapa id → posição na seção ── */
const songPosition = {};
SECTIONS.forEach(sec => {
  sec.ids.forEach((id, idx) => {
    songPosition[id] = { pos: idx+1, total: sec.ids.length, label: sec.label };
  });
});

/* ── Tamanho de fonte via CSS variable (funciona sempre, inclusive no landscape) ── */
let fontSize = parseInt(localStorage.getItem('sps_fontSize') || '20');

function applyFont() {
  document.documentElement.style.setProperty('--letra-tam', fontSize + 'px');
  document.getElementById('btn-menor').disabled = fontSize <= 11;
  document.getElementById('btn-maior').disabled = fontSize >= 32;
}

function changeFont(delta) {
  fontSize = Math.min(32, Math.max(11, fontSize + delta));
  localStorage.setItem('sps_fontSize', fontSize);
  applyFont();
}

/* ── Navegação ── */
function showCapa() {
  document.getElementById("capa").style.display = "";
  document.getElementById("view-index").classList.remove("active");
  document.getElementById("view-song").classList.remove("active");
  window.scrollTo(0,0);
}

function showIndex() {
  document.getElementById("capa").style.display = "none";
  document.getElementById("view-index").classList.add("active");
  document.getElementById("view-song").classList.remove("active");
  window.scrollTo(0,0);
}

function openSong(id) {
  const song = SONGS.find(s => s.id === id);
  if (!song) return;
  currentSong = song;

  document.getElementById("capa").style.display = "none";
  document.getElementById("view-index").classList.remove("active");
  document.getElementById("view-song").classList.add("active");

  const sp = songPosition[song.id];
  document.getElementById("track-num").textContent = sp ? `${sp.pos} / ${sp.total}` : '';
  document.getElementById("song-title").textContent = song.titulo;

  let meta = `<span>${song.interprete}</span><span class="cantor-badge">🎤 ${song.cantor}</span>`;
  if (song.tom) meta += `<span class="tom-badge">${song.tom}</span>`;
  document.getElementById("song-meta").innerHTML = meta;

  document.getElementById("song-links").innerHTML = song.yt
    ? `<a href="${song.yt}" class="yt" target="_blank">▶ YouTube</a>`
    : ``;

  const _sp = songPosition[song.id];
  document.getElementById("btn-prev").disabled = !_sp || _sp.pos === 1;
  document.getElementById("btn-next").disabled = !_sp || _sp.pos === _sp.total;

  loadLyrics(song);
  applyFont();
  window.scrollTo(0,0);
}

function navSong(dir) {
  if (!currentSong) return;
  const sp = songPosition[currentSong.id];
  if (!sp) return;
  const sec = SECTIONS.find(s => s.label === sp.label);
  if (!sec) return;
  const idx = sec.ids.indexOf(currentSong.id);
  const next = idx + dir;
  if (next >= 0 && next < sec.ids.length) openSong(sec.ids[next]);
}

/* ── Letra ── */
let currentSong = null;

function loadLyrics(song) {
  const area = document.getElementById("lyrics-area");
  const entrada = (typeof letras !== "undefined") ? letras[song.id] : null;
  if (entrada && entrada.letra && entrada.letra.trim() !== "") {
    const escaped = entrada.letra
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    area.innerHTML = `<div class="lyrics-text">${escaped}</div>`;
  } else {
    area.innerHTML = `
      <div class="state-error">
        <div class="err-icon">🎵</div>
        <p>Letra ainda não cadastrada.<br>
           Adicione no <strong>letras2.js</strong>, entrada id <strong>${song.id}</strong>.</p>
      </div>`;
  }
}

/* ── Busca ── */
function normalize(s) {
  return s.toLowerCase().normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9 ]/g,"");
}

function filterSongs(q) {
  const btn = document.getElementById("search-clear");
  btn.classList.toggle("visible", q.length > 0);

  const term = normalize(q.trim());
  const info = document.getElementById("search-info");

  if (!term) {
    info.textContent = "";
    buildIndex();
    return;
  }

  const found = SONGS.filter(s =>
    normalize(s.titulo).includes(term) || normalize(s.interprete).includes(term)
  );

  info.textContent = found.length === 0
    ? "Nenhuma música encontrada."
    : `${found.length} resultado${found.length > 1 ? 's' : ''}`;

  const container = document.getElementById("list-container");
  if (found.length === 0) {
    container.innerHTML = `<div class="no-results">🎵 Nenhuma música encontrada para "<strong>${q}</strong>"</div>`;
    return;
  }

  let html = `<div class="music-list">`;
  found.forEach(s => {
    const sp = songPosition[s.id];
    const pos = sp ? sp.pos : s.id;
    html += `
      <button onclick="openSong(${s.id})">
        <span class="num">${pos}</span>
        <span class="info">
          <span>${s.titulo}</span>
          <span class="artista">${s.interprete}</span>
        </span>
        <span class="cantor-tag">${s.cantor}</span>
      </button>`;
  });
  html += `</div>`;
  container.innerHTML = html;
}

function clearSearch() {
  const input = document.getElementById("search-input");
  input.value = "";
  filterSongs("");
  input.focus();
}

/* ── Índice completo ── */
function buildIndex() {
  const container = document.getElementById("list-container");
  let html = "";
  SECTIONS.forEach(sec => {
    html += `<div class="section-label">${sec.label}</div><div class="music-list">`;
    sec.ids.forEach((id, idx) => {
      const s = SONGS.find(x => x.id === id);
      if (!s) return;
      html += `
        <button onclick="openSong(${s.id})">
          <span class="num">${idx+1}</span>
          <span class="info">
            <span>${s.titulo}</span>
            <span class="artista">${s.interprete}</span>
          </span>
          <span class="cantor-tag">${s.cantor}</span>
        </button>`;
    });
    html += `</div>`;
  });
  container.innerHTML = html;
}

/* ── Init ── */
applyFont();
buildIndex();
</script>
